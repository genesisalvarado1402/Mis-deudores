<!DOCTYPE html><html lang='es'><head><meta charset='UTF-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Mis Deudores</title><style>body{font-family:Arial;background:#ffe4ef;padding:20px}div{max-width:500px;margin:auto;background:#fff;padding:20px;border-radius:15px}h2{color:#d63384}input,button{width:100%;padding:10px;margin:6px 0}button{background:#ff69b4;color:#fff;border:0}li{display:flex;justify-content:space-between;margin:6px 0}</style></head><body><div><h2>💖 Mis Deudores</h2><input id=n placeholder='Nombre'><input id=m type=number placeholder='Monto'><button onclick='a()'>Agregar</button><ul id=l></ul></div><script>let d=JSON.parse(localStorage.d||'[]');function r(){l.innerHTML='';d.forEach((e,i)=>l.innerHTML+=`<li>${e.n}: $${Number(e.m).toLocaleString('es-CL')} <button onclick="x(${i})">❌</button></li>`);localStorage.d=JSON.stringify(d)}function a(){if(!n.value||!m.value)return;d.push({n:n.value,m:m.value});n.value='';m.value='';r()}function x(i){d.splice(i,1);r()}r()</script></body></html>
